<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>90 Day Tracker</title>
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center}

/* NAME SCREEN */
#startScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#020617;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:10;
}
#startScreen input{
padding:12px;
border-radius:10px;
border:none;
font-size:18px;
margin:10px;
}
#startScreen button{
padding:12px 25px;
border:none;
border-radius:10px;
background:#22c55e;
color:white;
font-size:18px;
cursor:pointer;
}

/* APP */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:10px;padding:10px}
.day{background:#1e293b;padding:14px;border-radius:12px;cursor:pointer}
.active{background:#16a34a}
.panel{background:#1e293b;margin:12px auto;padding:15px;border-radius:15px;width:95%;max-width:800px}
button{padding:10px 18px;border:none;border-radius:10px;background:#ef4444;color:white;font-size:16px;cursor:pointer;margin-top:10px}
.name{color:#ff2d2d;font-weight:bold}
.badge{padding:6px 12px;border-radius:20px;margin-top:8px;display:inline-block;font-weight:bold}
.beginner{background:#3b82f6}
.warrior{background:#f59e0b}
.elite{background:#22c55e}
</style>
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen">
<h1>Enter Your Name</h1>
<input id="nameInput" placeholder="Your Name">
<button onclick="startApp()">Start Journey</button>
</div>

<h1>🔥 90 Day Transformation</h1>

<div class="panel">
<h2>Welcome <span class="name" id="username"></span></h2>
<div id="badge"></div>
<div>🔥 Streak: <span id="streak">0</span></div>
</div>

<div class="grid" id="days"></div>

<div class="panel">
<h2 id="title">Select a Day</h2>
<div id="plan"></div>
<div id="tasks"></div>
</div>

<div class="panel">
<h3>Progress</h3>
<canvas id="chart"></canvas>
</div>

<button onclick="resetAll()">Reset Progress</button>

<script>

/* START SCREEN */
function startApp(){
let n=nameInput.value.trim();
if(!n) return alert("Enter name");
localStorage.setItem("username",n);
init();
}

function init(){
let n=localStorage.getItem("username");
if(n){
startScreen.style.display="none";
username.innerText=n;
}
}
init();

/* DAILY PLANS */
const plans=[
["Chest Day","Pushups 3x10<br>Diamond 2x6<br>Plank 3x30s"],
["Leg Day","Squats 3x15<br>Lunges 3x10<br>Run 15min"],
["Back Day","Superman 3x20s<br>Snow Angels 3x12"],
["Chest Shoulder","Pike Pushups 3x8<br>Pushups 3x12"],
["Full Body","Burpees 3x8<br>Jump Squats 3x10"],
["Cardio Core","Run 20min<br>Crunch 3x20"],
["Rest","Stretch + Walk"]
];

/* GENERATE DAYS */
let progress=[];
let streak=0;
let done=0;

for(let i=1;i<=90;i++){
let d=document.createElement("div");
d.className="day";
d.innerText="Day "+i;

if(localStorage.getItem("done"+i)){
d.classList.add("active");
progress.push(1);
done++;streak++;
}else{progress.push(0);streak=0}

d.onclick=()=>openDay(i);
days.appendChild(d);
}

streak.innerText=streak;

/* BADGE */
let b="";
if(done<=30)b="<div class='badge beginner'>Beginner</div>";
else if(done<=60)b="<div class='badge warrior'>Warrior</div>";
else b="<div class='badge elite'>Elite</div>";
badge.innerHTML=b;

/* OPEN DAY */
function openDay(day){
let p=plans[(day-1)%7];
title.innerText="Day "+day+" — "+p[0];
plan.innerHTML=p[1];

let html="";
["Stretch","Workout","Diet","Water","Posture"].forEach(t=>{
let id="d"+day+t;
let c=localStorage.getItem(id)=="true";
html+=`<label><input type=checkbox ${c?"checked":""}
onchange="localStorage.setItem('${id}',this.checked)"> ${t}</label>`;
});
html+=`<button onclick="finish(${day})">Mark Complete</button>`;
tasks.innerHTML=html;
}

/* COMPLETE */
function finish(day){
localStorage.setItem("done"+day,true);
alert("🔥 Day "+day+" completed!");
location.reload();
}

/* RESET */
function resetAll(){
if(confirm("Reset everything?")){
localStorage.clear();
location.reload();
}
}

/* GRAPH */
new Chart(chart,{
type:"line",
data:{
labels:[...Array(90).keys()].map(x=>x+1),
datasets:[{data:progress,borderWidth:3,tension:.3}]
},
options:{plugins:{legend:{display:false}}}
});
</script>

</body>
</html>
